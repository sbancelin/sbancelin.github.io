    PhD supervision:
      - label: Théo Martinaud — PhD, LP2N (since 2025)
        details: Brillouin microscopy for the biomechanics of connective tissues (VIPA-based spectrometer on a scanning microscope).
      - label: Nasim Akhtar — PhD, LP2N (since 2023)
        details: Multimodal 3-photon fluorescence microscopy applied to neurophotonics. Co-supervised with L. Cognet (50%).
      - label: Rohit Mangalwedhekar — PhD, LP2N (since 2023)
        details: Super-resolution multimodal dynamic microscopy in biophysical models and biological tissues. Co-supervised with L. Cognet (50%).
      - label: Johannes Roos — PhD, IINS (until 2023)
        details: Arkitekt — an open-source framework for modern bioimaging workflows. Co-supervised with V. Nägerl. Now postdoc at the University of Linz.

    Internship supervision:
      - label: Matys Lambert — IUT Mesures Physiques, 3rd year (2025)
        details: Assembly of a symmetric tensile extensometer to study connective tissues.
      - label: Gioele Sassi — M1, LP2N (2023)
        details: Design and implementation of a microscope for multiphoton imaging of single-walled carbon nanotubes in the IR range.
      - label: Mohamed Belkadi — M2, IINS (2022)
        details: PSF optimisation using SLM-based adaptive optics in brain tissue.
      - label: Philippe Nguyen — M2, IINS (2021)
        details: Development of quantitative approaches for inverse-contrast STED microscopy.

    Teaching:
      - label: M2 lectures — EUR Light & EUR Neurophotonics (2021–2024, 6 h/year)
        details: "Super-resolution STED microscopy in neuroscience; Microscopy beyond fluorescence."
      - label: Bibliographic project — Institut d'Optique (since 2023, 1 week/year)
        details: Supervising trios of IOGS engineering students working on a recent paper linked to the team's activities.
      - label: Labcourse IINS-BIC — M2 EUR-Light & EUR-Neuro (2021–2023, 2 weeks/year)
        details: Experimental projects comparing super-resolution techniques (STED, STORM, Expansion).
      - label: Instructor — ANF "Super-resolution microscopy", Bordeaux Imaging Center (2021–2023)
        details: Hands-on training in super-resolution microscopy (~4 h/year).
      - label: Instructor — CAJAL School, Bordeaux Neuroscience School (2021–2022)
        details: Advanced imaging techniques for cellular and systems neuroscience; connectomics from micro to macro scale.

    Service and responsibilities:
      - bullet: Member of the LP2N laboratory council (since 2025).
      - bullet: Deployment of a local generative-AI service on the lab compute server (2024–2025).
      - bullet: Organiser of the LP2N laboratory retreat, ~80 participants (2024).
      - bullet: Organiser of the LP2N microscopy Journal Club (since 2024).
      - bullet: Coordinator of the LP2N student seminars (2023–2024).
      - bullet: Animal-welfare duties (SBEA) and module lead, CHRONIC / PIV-EXPE facilities, Neurocampus (2021–2022).

    Evaluation and reviewing:
      - label: Expert evaluator — Horizon Europe, Marie Skłodowska-Curie Actions (since 2021)
        details: Evaluation of 6–10 postdoctoral fellowship applications per year, including reports and consensus discussions.
      - label: Journal reviewer (since 2021, 4–8 manuscripts/year)
        details: Nature Communications, Optica, Scientific Reports, Biomedical Optics Express, Optics Letters, Optics Express, Nano Letters, Scientific Data, and others.
      - label: Project evaluator (2022–2024)
        details: ANR PRC; Région Bourgogne-Franche-Comté (Envergure-Amorçage); A*Midex research equipment; Prix Pierre Favard (Société Française de Microscopie); FRC "Espoir en tête".

    Research funding:
      - label: AAP Recherche Nouvelle-Aquitaine — MOMI, PI (2024)
        details: 3 years, 192 k€. Multimodal optical microscopy to probe the architecture of bioprinted tissues (partner Poietis).
      - label: ANR JCJC — HaBIm, PI (2023)
        details: 5 years, 349 k€. Second-harmonic and Brillouin imaging to probe multiscale vocal-cord biomechanics.
      - label: Emergence INP, PI (2023)
        details: 1 year, 60 k€. Assembly of a 1700 nm multiphoton microscope for biological tissue imaging.
      - label: AAP Département SMR — BioMuIR, PI (2023)
        details: 1 year, 10 k€. Extensometer under a microscope to study connective-tissue biomechanics.
      - label: GPR Light — RoMan, co-PI 50% with L. Cognet (2023)
        details: PhD grant, 3 years, 115 k€. Super-resolution multimodal dynamic microscopy in biophysical models and biological tissues.
      - label: ERC Synergy — ENSEMBLE, task leader (2020)
        details: 6 years, 10 M€ (PI L. Groc). Structure and function of the brain extracellular space; task leader with V. Nägerl (2021–2022) and L. Cognet (since 2023).

    Collaborations:
