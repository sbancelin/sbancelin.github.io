    Scientific areas:
      - bullet: Light/matter interaction, biophotonics, nonlinear optics, neuroscience.
      - bullet: "Optical microscopy: multiphoton (SHG, CARS, THG, SFG/DFG), super-resolution (STED), polarimetry, ellipsometry, interferometry, adaptive optics."
      - bullet: "Computational analysis: 3D reconstruction, segmentation, mathematical morphology, numerical modelling."
      - bullet: "Collagen chemistry: protein aggregation (fibrillogenesis), extraction/purification, hydroxyproline assays."
      - bullet: "Tissue manipulation & imaging: skin, brain, bone, cartilage, cornea, embryos, tendon, biomimetic materials."
      - bullet: "Tissue physiopathology: skin biomechanics, prolapses, cancer, embryogenesis, EDS, osteoarthritis, Alzheimer's disease."
      - bullet: "Animal experiments: in vivo imaging, brain surgery, stereotaxic injection, animal care."

